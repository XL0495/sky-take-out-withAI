server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/sky_take_out?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: your_password

  data:
    redis:
      host: ${sky.redis.host:localhost}
      port: ${sky.redis.port:6379}
      password: ${sky.redis.password:}
    mongodb:
      uri: mongodb://localhost:27017/sky_take_out

langchain4j:
  community:
    dashscope:
      # 勿配置 base-url 为裸域名；DashScope Java SDK 会自行拼接 /api/v1/...，错误 base 易触发向量接口 404
      streaming-chat-model:
        api-key: ${DASHSCOPE_API_KEY}
        model-name: qwen-plus
      embedding-model:
        api-key: ${DASHSCOPE_API_KEY}
        model-name: text-embedding-v3

pinecone:
  enabled: true
  api-key: ${PINECONE_API_KEY:}
  index-name: chat-session
  cloud: aws
  region: us-east-1
  create-index: true


mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.sky.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

sky:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: project_admin
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token
    # 设置jwt签名加密时使用的密钥
    user-secret-key: project_user
    # 设置jwt过期时间
    user-ttl: 7200000
    # 设置前端传递过来的令牌名称
    user-token-name: authentication
  alioss:
    endpoint: ${sky.alioss.endpointi}
    access-key-id: ${sky.alioss.access-key-id}
    access-key-secret: ${sky.alioss.access-key-secret}
    bucket-name: ${sky.alioss.bucket-name}
  wechat:
    appid: ${sky.wechat.appid}
    secret: ${sky.wechat.secret}

springdoc:
  api-docs:
    enabled: true
  group-configs:
    - group: '管理端接口'
      paths-to-match: '/admin/**'
      packages-to-scan: com.sky.controller.admin
    - group: '用户端接口'
      paths-to-match: '/user/**'
      packages-to-scan: com.sky.controller.user

knife4j:
  enable: true # 开启 Knife4j 的增强 UI